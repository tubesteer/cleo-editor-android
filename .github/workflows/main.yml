name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # PERBAIKAN TOTAL: Menulis ulang build.gradle agar bersih & kompatibel dengan Gradle baru
    - name: Rewrite Android Build Configuration
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.fastsmartsystem.cleoeditor'
            compileSdkVersion 33

            defaultConfig {
                applicationId "com.fastsmartsystem.cleoeditor"
                minSdkVersion 21
                targetSdkVersion 33
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }

        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.jar'])
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cleo-editor-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
