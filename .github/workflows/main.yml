name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # BAGIAN PERBAIKAN: Membuat file keystore tiruan & menyuntikkan SDK versi 33
    - name: Bypass Keystore and SDK Missing Error
      run: |
        echo "storeFile=mock.keystore" > app/keystore.config
        echo "storePassword=mock_password" >> app/keystore.config
        echo "keyAlias=mock_alias" >> app/keystore.config
        echo "keyPassword=mock_password" >> app/keystore.config
        touch app/mock.keystore
        
        # Menyisipkan compileSdkVersion ke build.gradle secara otomatis sebelum dicompile
        sed -i 's/android {/android {\n    compileSdkVersion 33/' app/build.gradle

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cleo-editor-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        
